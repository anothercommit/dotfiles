# ~/.config/starship.toml
add_newline = false

format = """
$username\
$hostname\
$shlvl\
$singularity\
$kubernetes\
$directory\
$vcsh\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$hg_branch\
$buf\
$custom\
$sudo\
$cmd_duration\
$line_break\
$jobs\
$battery\
$status\
$character"""

[character] 
success_symbol = "[π](bold green)"
vicmd_symbol = "[π](bold cyan)"
vimcmd_replace_one_symbol = "[π](bold orange)"
vimcmd_replace_symbol = "[π](bold orange)"
vimcmd_visual_symbol = "[π](bold purple)"

[line_break]
disabled = true

[cmd_duration]
min_time = 10_000  
format = " took [$duration]($style)"


